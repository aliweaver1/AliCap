name: Build iOS App

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build unsigned iOS app
        run: |
          cd ios
          xcodebuild -workspace CaptionApp.xcworkspace \
            -scheme CaptionApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            -derivedDataPath build \
            clean build

      - name: Package app into IPA
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir Payload
          cp -r CaptionApp.app Payload/
          zip -r CaptionApp.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CaptionApp-ipa
          path: ios/build/Build/Products/Release-iphoneos/CaptionApp.ipa
